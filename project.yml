name: FitTrack
options:
  bundleIdPrefix: com.sixjeez
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
schemes:
  FitTrack:
    build:
      targets:
        FitTrack: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FitTrackUITests
targets:
  FitTrack:
    type: application
    platform: iOS
    sources:
      - FitTrack
    info:
      path: FitTrack/Info.plist
      properties:
        CFBundleDisplayName: FitTrack
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
  FitTrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - FitTrackUITests
    dependencies:
      - target: FitTrack
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
